settings:
  griefprevention-respect-claims: true
  griefprevention-respect-pvp: true
  # Worlds where InvinciblePlugin is fully disabled — no abilities, flight, or scoreboard.
  # Add world names (case-insensitive). Reloads with /invadmin reload.
  disabled-worlds:
    - bendingtest
    - spawn

  action-bar-update-interval: 4
  scoreboard-update-interval: 10
  block-restore-ticks: 600
  stat-points-per-kill: 3
  underdog-gap-threshold: 15
  underdog-max-gap: 60
  underdog-max-reduction: 0.20
  player-max-health: 60.0
  max-stat-level: 30
  base-fly-speed: 0.025
  max-fly-speed: 0.075
  base-walk-speed: 0.2
  max-walk-speed: 0.28

flight:
  pose-enabled: true
  speed-threshold: 0.3
  glide-speed: 0.8
  foot-particles-enabled: true
  foot-particle-type: CLOUD
  particle-count: 18
  particle-spread: 0.35
  particle-speed: 0.04
  landing-shockwave-enabled: true
  collision-damage: 4.0
  collision-particle: CLOUD
  landing-shockwave-radius: 6.0
  landing-shockwave-rings: 5
  landing-shockwave-particle: BLOCK
  landing-shockwave-sound: ENTITY_GENERIC_EXPLODE
  landing-shockwave-sound-volume: 1.2
  landing-shockwave-sound-pitch: 0.6
  phase-through-blocks: true
  break-blocks: true
  break-reach: 2.5
  break-radius: 0.9
  break-side-radius: 1.5

combat:
  iframe-ticks: 8
  combo-window-ms: 2000
  backstab-bonus: 0.30
  momentum-bonus: 0.20
  combo-multipliers:
    1: 1.00
    2: 1.10
    3: 1.20
    4: 1.30
    5: 1.45
    6: 1.60
    7: 1.80
    default: 2.00

messages:
  character-selected: "&aYou have become &e%character%&a!"
  ability-bound: "&aAbility &e%ability% &abound to slot &e%slot%&a!"
  no-character: "&cYou have not selected a character yet!"
  no-permission: "&cYou do not have permission to do that!"
  stat-upgraded: "&aUpgraded &e%stat% &ato level &e%level%&a!"
  points-given: "&aGiven &e%amount% &astat points to &e%player%&a!"

universal-slot-5:
  cooldown-ms: 3000
  velocity: 3.8
  range: 4.5

universal-slot-6:
  cooldown-ms: 6000
  damage: 6.0
  range: 5.0
  velocity: 1.8
  hold-ticks: 40

stats:
  damage-stat-per-level: 0.2
  speed-stat-per-level: 0.010
  duration-stat-per-level: 0.04
  defense-stat-per-level: 0.2
  regen-stat-per-level: 1
  regen-max-amplifier: 2
  regen-amplifier-divisor: 4

# ═══════════════════════════════════════════════════════════════════════════════
# ABILITY CONFIGURATION
# Max HP = 20 (10 hearts). No move should one-shot a full HP player.
# Damage guide: Light=2-5, Medium=5-9, Heavy=9-13, Ultimate=13-14 (cap)
